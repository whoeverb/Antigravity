name: Daily Signal Generation

on:
  schedule:
    - cron: '17 11 * * 1-5'  # Runs Mon-Fri at 8:30 AM Eastern Time (12:30 UTC)
    - cron: '23 15 * * 1-5'   # Runs Mon-Fri at 12:00 PM Eastern Time (16:00 UTC)
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

jobs:
  generate-signals:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          architecture: 'x64'

      - name: Verify Python version
        run: python --version

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r signal_engine/requirements.txt

      - name: Run signal generator
        run: python signal_engine/run_daily_signals.py

      - name: Commit and push changes
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add signals.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "chore: update signals.json" && git push)
