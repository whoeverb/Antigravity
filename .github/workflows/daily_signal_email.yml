# .github/workflows/daily_signal_email.yml
#
# GitHub Actions → Settings → Secrets and variables → Actions:
#
#   VARIABLES tab:
#     GMAIL_USER       your Gmail address
#     RECIPIENT_EMAIL  destination address
#
#   SECRETS tab:
#     GMAIL_APP_PASS   16-char App Password from myaccount.google.com/apppasswords

name: Daily Signal Email

on:
  schedule:
    - cron: "0 13 * * 1-5"    # Mon–Fri 8:00 AM ET
    - cron: "0 17 * * 1-5"    # Mon–Fri 12:00 PM ET
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  run-and-email:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4.2.2

      - name: Set up Python
        uses: actions/setup-python@v5.6.0
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install yfinance pandas pandas_ta_classic numpy prophet

      - name: Generate signals
        run: python signal_engine/main.py
        env:
          PYTHONUNBUFFERED: "1"

      - name: Send signal email
        run: python send_email.py signals.json
        env:
          GMAIL_USER:      ${{ vars.GMAIL_USER }}
          GMAIL_APP_PASS:  ${{ secrets.GMAIL_APP_PASS }}
          RECIPIENT_EMAIL: ${{ vars.RECIPIENT_EMAIL }}

      - name: Upload signals artifact
        if: always()
        uses: actions/upload-artifact@v4.6.2
        with:
          name: signals-${{ github.run_id }}
          path: signals.json
          retention-days: 7
