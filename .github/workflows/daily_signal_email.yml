# .github/workflows/daily_signal_email.yml
#
# Checks out the repo (which has the latest signals.json committed by the
# signal generation workflow) and emails the HTML report.
#
# GitHub Actions → Settings → Secrets and variables → Actions:
#
#   VARIABLES tab:
#     GMAIL_USER       your Gmail address
#     RECIPIENT_EMAIL  destination address
#
#   SECRETS tab:
#     GMAIL_APP_PASS   16-char App Password from myaccount.google.com/apppasswords

name: Daily Signal Email

on:
  schedule:
    - cron: "17 12 * * 1-5"   # Mon–Fri 8:35 AM ET (5 min after signal gen)
    - cron: "37 15 * * 1-5"    # Mon–Fri 12:05 PM ET (5 min after signal gen)
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  send-email:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4.2.2

      - name: Set up Python
        uses: actions/setup-python@v5.6.0
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r signal_engine/requirements.txt

      - name: Send signal email
        run: python send_email.py signals.json
        env:
          GMAIL_USER:      ${{ vars.GMAIL_USER }}
          GMAIL_APP_PASS:  ${{ secrets.GMAIL_APP_PASS }}
          RECIPIENT_EMAIL: ${{ vars.RECIPIENT_EMAIL }}
