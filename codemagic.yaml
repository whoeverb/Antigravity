# codemagic.yaml
workflows:
  ios-build:
    name: iOS Build
    environment:
      flutter: stable
      groups:
        - macos_credentials
      vars:
        XCODE_WORKSPACE: "mobile_app/ios/Runner.xcworkspace"
        XCODE_SCHEME: "Runner"
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true
    scripts:
      - name: Fetch Flutter Dependencies
        script: |
          cd mobile_app
          flutter pub get

      - name: Build Unsigned iOS App Bundle
        script: |
          cd mobile_app
          flutter build ios --release --no-codesign

      - name: Clean Previous Assembly Artifacts
        script: |
          cd mobile_app
          rm -rf Payload
          rm -f *.ipa

      - name: Assemble Traditional Payload Architecture
        script: |
          cd mobile_app
          mkdir -p Payload
          cp -r build/ios/iphoneos/Runner.app Payload/

      - name: Pack IPA and Stage to Codemagic Output Directory
        script: |
          cd mobile_app
          zip -r $CM_BUILD_DIR/market_projection.ipa Payload

    artifacts:
      - "*.ipa"
      - mobile_app/*.ipa